version: "3.8"

services:
  clawdrop-sse:
    build:
      context: ./packages/clawdrop-mcp
      dockerfile: Dockerfile
    container_name: clawdrop-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./packages/clawdrop-mcp/.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - clawdrop-data:/app/data
    networks:
      - clawdrop-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  clawdrop-data:

networks:
  clawdrop-net:
    driver: bridge