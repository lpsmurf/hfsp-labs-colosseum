# Trial app + Openclaw Platform routing for clawdrop.live

upstream trial_frontend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
}

upstream trial_api {
    server 127.0.0.1:8787 max_fails=3 fail_timeout=30s;
}

upstream openclaw_platform {
    server 127.0.0.1:8788 max_fails=3 fail_timeout=30s;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clawdrop.live;

    ssl_certificate /etc/letsencrypt/live/clawdrop.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clawdrop.live/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Openclaw Platform API (port 8788) ──────────────────────────────
    # Must come BEFORE /api/ to take priority
    location /api/platform/ {
        proxy_pass http://openclaw_platform/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Trial API (port 8787) ──────────────────────────────────────────
    # /api/chat → SSE streaming (long timeout, no buffering)
    location /api/chat {
        proxy_pass http://trial_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 300s;
    }

    # /api/health and /api/quota
    location /api/ {
        proxy_pass http://trial_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend ───────────────────────────────────────────────────────
    # /try → trial chatbot frontend
    location /try {
        proxy_pass http://trial_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # /dashboard → authenticated dashboard (same frontend, different route)
    location /dashboard {
        proxy_pass http://trial_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # / → landing page static files
    location / {
        root /var/www/clawdrop;
        try_files $uri $uri/ =404;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name clawdrop.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
