# HFSP Labs Log Rotation Configuration
# Place this file at /etc/logrotate.d/hfsp-labs

/home/clawd/.openclaw/workspace/hfsp-labs-colosseum/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 clawd clawd
    sharedscripts
    
    postrotate
        # Restart pm2 processes to release file handles
        pm2 reload all > /dev/null 2>&1 || true
    endscript
}

# Alternative: If using Docker
/var/lib/docker/containers/*/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
