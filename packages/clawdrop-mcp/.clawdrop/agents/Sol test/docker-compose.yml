name: clawdrop-sol-test
services:
  openclaw:
    image: hfsp-tenant-runtime
    container_name: clawdrop-sol-test
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=8647506605:AAGAEpJGcI93skxvkBxkVqmrGj1-OWgB1wY
      - LLM_API_KEY=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


    volumes:
      - /home/clawd/.openclaw/workspace/hfsp-labs-colosseum/packages/clawdrop-mcp/.clawdrop/agents/Sol test/config:/home/clawd/.openclaw
      - /home/clawd/.openclaw/workspace/hfsp-labs-colosseum/packages/clawdrop-mcp/.clawdrop/agents/Sol test/secrets:/home/clawd/.openclaw/secrets:ro
      - /home/clawd/.openclaw/workspace/hfsp-labs-colosseum/packages/clawdrop-mcp/.clawdrop/agents/Sol test/workspace:/tenant/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
