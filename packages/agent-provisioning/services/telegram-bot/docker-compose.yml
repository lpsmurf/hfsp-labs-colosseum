# [KIMI] Docker Compose configuration for telegram-bot service
version: '3.8'

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hfsp-telegram-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:3335:3335"
    environment:
      PORT: 3335
      NODE_ENV: ${NODE_ENV:-development}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_ID: ${TELEGRAM_BOT_ID}
      TELEGRAM_SECRET_TOKEN: ${TELEGRAM_SECRET_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      # Use service name for inter-container communication on the docker network
      AGENT_BRAIN_URL: ${AGENT_BRAIN_URL:-http://agent-brain:3334}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - hfsp-network
    depends_on:
      agent-brain:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3335/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  agent-brain:
    build:
      context: ../agent-brain
      dockerfile: Dockerfile
    container_name: hfsp-agent-brain
    restart: unless-stopped
    ports:
      - "127.0.0.1:3334:3334"
    environment:
      PORT: 3334
      NODE_ENV: ${NODE_ENV:-development}
    networks:
      - hfsp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3334/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  hfsp-network:
    driver: bridge
